<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Time Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin-bottom: 70px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #222;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .bottom-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .bottom-nav a:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<div class="bottom-nav">

<a href="/dashboard"
class="{% if request.path == '/dashboard' %}text-primary{% endif %}">
📊 Dashboard
</a>

<a href="/add-task"
class="{% if request.path == '/add-task' %}text-primary{% endif %}">
➕ Add
</a>

<a href="/tasks"
class="{% if request.path == '/tasks' %}text-primary{% endif %}">
📋 Tasks
</a>

<a href="/calendar"
class="{% if request.path == '/calendar' %}text-primary{% endif %}">
📅 Calendar
</a>

</div>

</body>
</html>
