{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Add New Task</h2>

<div class="card p-4 shadow">
    <form action="/add" method="POST">
        <input type="text" name="title" class="form-control mb-3" placeholder="Task Title" required>

        <input type="text" name="description" class="form-control mb-3" placeholder="Description">

        <input type="datetime-local" name="deadline" class="form-control mb-3">

        <button type="submit" class="btn btn-primary">Add Task</button>
    </form>
</div>

{% endblock %}
